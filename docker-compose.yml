services:
  mysql:
    image: mysql:8.0
    container_name: constitution_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: constitution_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: constitution_backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/constitution_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8081
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: constitution_frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mysql_data:
